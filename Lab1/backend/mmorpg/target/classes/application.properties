spring.application.name=mmorpg

# CONFIGURACIÓN DE CONEXIÓN (JDBC) - Apuntando al nuevo entorno
spring.datasource.url=jdbc:postgresql://localhost:5435/db_laboratorio
spring.datasource.username=admin_raid
spring.datasource.password=superpassword123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# SCHEMA INITIALIZATION
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.schema-locations=classpath:schema.sql

# Hibernate settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true